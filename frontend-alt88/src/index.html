<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Desktop Dashboard - DuckDB Admin</title>
  <base href="./">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <meta name="description" content="Desktop Dashboard with DuckDB/SQLite database management">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0f172a;
    }
    app-root {
      display: block;
      width: 100%;
      height: 100%;
    }
    /* Loading state */
    app-root:empty::after {
      content: 'Loading Dashboard...';
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 18px;
      color: #94a3b8;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    }
  </style>
</head>
<body>
  <app-root></app-root>
</body>
</html>
